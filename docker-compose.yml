version: '3.9'
services:
  db:
    image: mysql:8.0
    container_name: dungeon-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dungeonpass
      MYSQL_DATABASE: dungeon_realm
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pdungeonpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: dungeon-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: dungeon_realm
      DB_USER: root
      DB_PASS: dungeonpass
      PORT: 8080
    ports:
      - "8080:8080"

volumes:
  db-data:
